<!-- Community View - Reddit Style Redesign -->
<div id="community-view" class="fixed inset-0 bg-gray-50 text-black overflow-hidden hidden z-50">
  <div class="flex h-full">
    
    <!-- Main Feed Area -->
    <div class="flex-1 flex flex-col overflow-y-auto">
      
      <!-- Header -->
      <div class="bg-white border-b border-gray-200 sticky top-0 z-40 p-4">
        <div class="flex items-center justify-between mb-4">
          <button onclick="closeCommunity()" class="text-[#FE2C55] flex items-center hover:bg-gray-100 px-3 py-2 rounded-lg transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="15 18 9 12 15 6" />
            </svg>
            <span>Back</span>
          </button>
          <h1 class="text-2xl font-bold">Community</h1>
          <div class="w-20"></div>
        </div>
        
        <!-- Sorting Options -->
        <div class="flex gap-2 overflow-x-auto pb-2">
          <button onclick="sortCommunityNotes('hot')" class="sort-btn px-4 py-2 rounded-full bg-[#FE2C55] text-white font-medium text-sm whitespace-nowrap" data-sort="hot">
            🔥 Hot
          </button>
          <button onclick="sortCommunityNotes('new')" class="sort-btn px-4 py-2 rounded-full bg-gray-200 text-black font-medium text-sm whitespace-nowrap hover:bg-gray-300 transition" data-sort="new">
            ✨ New
          </button>
          <button onclick="sortCommunityNotes('top')" class="sort-btn px-4 py-2 rounded-full bg-gray-200 text-black font-medium text-sm whitespace-nowrap hover:bg-gray-300 transition" data-sort="top">
            ⭐ Top
          </button>
          <button onclick="sortCommunityNotes('rising')" class="sort-btn px-4 py-2 rounded-full bg-gray-200 text-black font-medium text-sm whitespace-nowrap hover:bg-gray-300 transition" data-sort="rising">
            📈 Rising
          </button>
        </div>
      </div>

      <!-- Create Post Section -->
      <div class="bg-white border-b border-gray-200 p-4">
        <div class="flex gap-3 items-center">
          <img id="user-avatar-create" src="" alt="Your avatar" class="w-10 h-10 rounded-full">
          <button onclick="showCreatePostForm()" class="flex-1 bg-gray-100 hover:bg-gray-200 transition text-gray-600 px-4 py-2 rounded-full text-left">
            What's on your mind?
          </button>
        </div>
      </div>

      <!-- Notes Feed -->
      <div id="notes-feed" class="flex-1 overflow-y-auto">
        <!-- Notes will be loaded dynamically here -->
      </div>

      <!-- Loading State -->
      <div id="feed-loading" class="hidden flex items-center justify-center py-8">
        <i class="fas fa-spinner fa-spin text-2xl text-[#FE2C55]"></i>
      </div>

      <!-- Empty State -->
      <div id="feed-empty" class="hidden flex flex-col items-center justify-center py-12 text-gray-500">
        <i class="fas fa-comments text-4xl mb-3 opacity-50"></i>
        <p class="text-lg font-medium">No posts yet</p>
        <p class="text-sm">Be the first to share something!</p>
      </div>
    </div>

    <!-- Sidebar (Desktop Only) -->
    <div class="hidden lg:block w-80 bg-white border-l border-gray-200 overflow-y-auto">
      <!-- Community Info -->
      <div class="p-4 border-b border-gray-200">
        <h2 class="text-lg font-bold mb-3">About Community</h2>
        <div class="space-y-2 text-sm text-gray-600">
          <p><strong>Members:</strong> <span id="community-members">0</span></p>
          <p><strong>Active Now:</strong> <span id="community-active">0</span></p>
          <p id="community-description" class="text-gray-700 mt-3"></p>
        </div>
      </div>

      <!-- Create Post Button -->
      <div class="p-4 border-b border-gray-200">
        <button onclick="showCreatePostForm()" class="w-full bg-[#FE2C55] text-white py-2 rounded-lg font-medium hover:bg-[#ef2950] transition">
          Create Post
        </button>
      </div>

      <!-- Rules -->
      <div class="p-4 border-b border-gray-200">
        <h3 class="font-bold mb-3">Rules</h3>
        <ol class="text-sm space-y-2 text-gray-600">
          <li><strong>1.</strong> Be respectful</li>
          <li><strong>2.</strong> No spam</li>
          <li><strong>3.</strong> No NSFW content</li>
          <li><strong>4.</strong> Follow platform guidelines</li>
        </ol>
      </div>

      <!-- Moderators -->
      <div class="p-4">
        <h3 class="font-bold mb-3">Moderators</h3>
        <div id="moderators-list" class="space-y-2 text-sm">
          <!-- Moderators will be loaded here -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Post Modal -->
<div id="create-post-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto">
    <!-- Modal Header -->
    <div class="flex items-center justify-between p-4 border-b border-gray-200 sticky top-0 bg-white">
      <h2 class="text-xl font-bold">Create a Post</h2>
      <button onclick="closeCreatePostForm()" class="text-gray-500 hover:text-gray-700">
        <i class="fas fa-times text-2xl"></i>
      </button>
    </div>

    <!-- Modal Content -->
    <div class="p-4">
      <!-- User Info -->
      <div class="flex items-center gap-3 mb-4">
        <img id="user-avatar-modal" src="" alt="Your avatar" class="w-10 h-10 rounded-full">
        <div>
          <p id="user-name-modal" class="font-bold"></p>
          <p class="text-sm text-gray-500">Posting to Community</p>
        </div>
      </div>

      <!-- Form -->
      <textarea id="post-content" placeholder="What's on your mind? (200 characters max)" maxlength="200" class="w-full p-4 border border-gray-200 rounded-lg resize-none h-32 focus:outline-none focus:ring-2 focus:ring-[#FE2C55]"></textarea>
      
      <div id="char-counter" class="text-sm text-gray-500 mt-2">200 characters remaining</div>

      <!-- Image Preview -->
      <div id="image-preview-modal" class="mt-4 hidden">
        <img id="preview-img-modal" class="max-h-64 rounded-lg mx-auto mb-3">
        <button onclick="removeImageModal()" class="text-red-500 text-sm hover:text-red-700">
          <i class="fas fa-times mr-1"></i>Remove Photo
        </button>
      </div>

      <!-- Action Buttons -->
      <div class="mt-4 flex items-center gap-3">
        <label class="flex-1 cursor-pointer bg-gray-100 p-3 rounded-lg hover:bg-gray-200 transition text-center text-sm font-medium">
          <input type="file" id="post-image" accept="image/*" class="hidden" onchange="handlePostImagePreview(event)">
          <i class="fas fa-camera mr-2"></i>Add Photo
        </label>
        <button onclick="publishPost()" class="flex-1 bg-[#FE2C55] text-white p-3 rounded-lg font-medium hover:bg-[#ef2950] transition">
          Post
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Post Component Template (for reference) -->
<template id="post-template">
  <div class="post-card bg-white border-b border-gray-200 p-4 hover:bg-gray-50 transition cursor-pointer">
    <!-- Post Header -->
    <div class="flex items-start gap-3 mb-3">
      <img class="post-avatar w-10 h-10 rounded-full flex-shrink-0" src="" alt="">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="post-author font-bold hover:underline"></span>
          <span class="post-community text-sm text-gray-500">r/Community</span>
          <span class="post-time text-sm text-gray-500">• 2h</span>
        </div>
      </div>
      <button class="post-menu text-gray-500 hover:text-gray-700 hover:bg-gray-100 p-2 rounded">
        <i class="fas fa-ellipsis-h"></i>
      </button>
    </div>

    <!-- Post Content -->
    <div class="mb-3">
      <p class="post-content text-black leading-normal"></p>
      <img class="post-image w-full rounded-lg mt-3 max-h-96 object-cover hidden" src="" alt="">
    </div>

    <!-- Post Stats -->
    <div class="text-xs text-gray-500 mb-3 flex gap-4">
      <span class="post-upvotes">0 upvotes</span>
      <span class="post-comments">0 comments</span>
      <span class="post-shares">0 shares</span>
    </div>

    <!-- Post Actions -->
    <div class="flex items-center justify-between border-t border-gray-200 pt-2 -mx-4 px-4">
      <button class="post-upvote flex-1 flex items-center justify-center gap-2 py-2 text-gray-600 hover:bg-gray-100 rounded transition group">
        <svg class="w-5 h-5 group-hover:text-[#FE2C55]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4" />
        </svg>
        <span class="text-sm">Upvote</span>
      </button>
      <button class="post-downvote flex-1 flex items-center justify-center gap-2 py-2 text-gray-600 hover:bg-gray-100 rounded transition group">
        <svg class="w-5 h-5 group-hover:text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
        <span class="text-sm">Downvote</span>
      </button>
      <button class="post-comment flex-1 flex items-center justify-center gap-2 py-2 text-gray-600 hover:bg-gray-100 rounded transition group">
        <svg class="w-5 h-5 group-hover:text-[#FE2C55]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        <span class="text-sm">Comment</span>
      </button>
      <button class="post-share flex-1 flex items-center justify-center gap-2 py-2 text-gray-600 hover:bg-gray-100 rounded transition group">
        <svg class="w-5 h-5 group-hover:text-[#FE2C55]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <span class="text-sm">Share</span>
      </button>
    </div>
  </div>
</template>

<style>
  /* Community View Styles */
  #community-view {
    animation: slideIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  .post-card {
    transition: background-color 0.2s ease;
  }

  .post-card:hover {
    background-color: #f8f9fa;
  }

  .sort-btn.active {
    background-color: #FE2C55;
    color: white;
  }

  /* Scrollbar Styling */
  #notes-feed::-webkit-scrollbar,
  #community-view > div::-webkit-scrollbar {
    width: 8px;
  }

  #notes-feed::-webkit-scrollbar-track,
  #community-view > div::-webkit-scrollbar-track {
    background: transparent;
  }

  #notes-feed::-webkit-scrollbar-thumb,
  #community-view > div::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 4px;
  }

  #notes-feed::-webkit-scrollbar-thumb:hover,
  #community-view > div::-webkit-scrollbar-thumb:hover {
    background: #999;
  }

  /* Modal Animation */
  #create-post-modal {
    animation: fadeIn 0.2s ease-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  /* Responsive */
  @media (max-width: 1024px) {
    #community-view > div > div:last-child {
      display: none !important;
    }
  }
</style>
